<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f8f5f" />
    <title>Registrasi Berhasil - Carefastindo Absensi</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        --primary: #0f8f5f;
        --primary-dark: #0a6d49;
        --text: #1f2937;
        --muted: #64748b;
        --surface: #ffffff;
        --line: #d8e2dc;
        --bg: #f3f7f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(15, 143, 95, 0.12), rgba(15, 143, 95, 0)),
          var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 520px);
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 48px rgba(31, 41, 55, 0.12);
        padding: 32px;
        text-align: center;
      }

      .mark {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: var(--primary);
        color: #ffffff;
        display: grid;
        place-items: center;
        margin: 0 auto 22px;
        font-size: 38px;
        font-weight: 700;
        line-height: 1;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
        color: var(--primary-dark);
      }

      p {
        margin: 0;
        font-size: 17px;
        line-height: 1.6;
        color: var(--muted);
      }

      .brand {
        margin-top: 28px;
        padding-top: 20px;
        border-top: 1px solid var(--line);
        font-size: 14px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">✓</div>
      <h1>Registrasi berhasil</h1>
      <p>Silakan login ke aplikasi Carefastindo Absensi menggunakan email dan kata sandi yang sudah didaftarkan.</p>
      <div class="brand">Carefastindo Absensi</div>
    </main>
  </body>
</html>
